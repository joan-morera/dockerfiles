services:
  shatari-backend:
    image: ghcr.io/joan-morera/shatari-backend:latest
    container_name: shatari-backend
    restart: unless-stopped
    volumes:
      - shatari-data:/app/data
      - shatari-realms:/app/realms
    environment:
      - BATTLE_NET_KEY=${BATTLE_NET_KEY}
      - BATTLE_NET_SECRET=${BATTLE_NET_SECRET}
      - ALIVENESS_PINGBACK=${ALIVENESS_PINGBACK}
      - REALM_PINGBACK=${REALM_PINGBACK}

  shatari-frontend:
    image: ghcr.io/joan-morera/shatari-frontend:latest
    container_name: shatari-frontend

    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - shatari-data:/usr/share/nginx/html/data
      - shatari-realms:/usr/share/nginx/html/json/realms


volumes:
  shatari-data:
  shatari-realms:


