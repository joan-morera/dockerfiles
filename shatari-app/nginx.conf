server {
    listen 80;
    server_name localhost;

    # Include mime types to ensure CSS and JS are served correctly
    include /etc/nginx/mime.types;

    # Basic security headers - commented out for easier debugging
    # add_header X-Frame-Options "SAMEORIGIN";
    # add_header X-XSS-Protection "1; mode=block";
    # add_header X-Content-Type-Options "nosniff";
    # add_header Referrer-Policy "no-referrer-when-downgrade";


    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve auction data generated by backend
    location /data/ {
        alias /usr/share/nginx/html/data/;
        autoindex on;
    }

    # Serve realm data generated by backend
    location /json/ {
        alias /usr/share/nginx/html/json/;
        autoindex on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
