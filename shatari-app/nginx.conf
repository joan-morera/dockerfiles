server {
    listen 80;
    server_name localhost;

    # Basic security headers - adjust to your liking
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    
    # If you have issues with strict CSP meta tags in index.html, 
    # you can override or supplement them here with 'add_header Content-Security-Policy ...'

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Serve auction data generated by backend
    location /data/ {
        alias /usr/share/nginx/html/data/;
        autoindex on;
    }

    # Serve realm data generated by backend
    location /json/ {
        alias /usr/share/nginx/html/json/;
        autoindex on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
