name: Alfis | Build and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./alfis
    outputs:
      rebuild: ${{ steps.check.outputs.rebuild }}
      version_metadata: ${{ steps.meta.outputs.content }}
      alfis_version: ${{ steps.get_latest_release.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest alfis release tag
        id: get_latest_release
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/Revertron/Alfis.git | grep "refs/tags/v" | grep -v "\^{}" | tail -n1 | sed 's/.*\///')
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Check for latest package versions
        id: get_pkgs
        run: |
          docker run --rm alpine:latest sh -c "apk update >/dev/null && apk list rust cargo openssl-libs-static zlib-static pkgconf" | awk '{print $1}' | sort > current-packages.txt

      - name: Check for Changes
        id: check
        run: |
          FILE="package-versions.txt"
          REBUILD=false
          VERSION="${{ steps.get_latest_release.outputs.tag }}"
          
          echo "### Alfis Version Check & Rebuild Report" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD=true
            echo "- **Triggered manually via workflow_dispatch. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
          elif [ ! -f "$FILE" ]; then
            REBUILD=true
            echo "- **No existing version metadata found. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
          else
            OLD_ALFIS=$(grep "^alfis-" "$FILE" | sed 's/alfis-//' || true)
            
            echo "| Component | Cached Version | Upstream/New Version | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            
            DIFF_DETECTED=0
            if [ "$OLD_ALFIS" != "$VERSION" ]; then
              echo "| Alfis | $OLD_ALFIS | $VERSION | 🆕 Update available |" >> $GITHUB_STEP_SUMMARY
              DIFF_DETECTED=1
            else
              echo "| Alfis | $OLD_ALFIS | $VERSION |  Up to date |" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "##### Build Toolchain & Alpine Dependencies" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Cached Version | Alpine Repository Version | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            
            while read -r line; do
              pkg_name=$(echo "$line" | cut -d- -f1-2)
              if ! grep -q "^${pkg_name}-" "$FILE"; then
                pkg_name=$(echo "$line" | cut -d- -f1)
              fi
              old_line=$(grep "^${pkg_name}-" "$FILE" || true)
              if [ "$old_line" != "$line" ]; then
                echo "| $pkg_name | ${old_line#$pkg_name-} | ${line#$pkg_name-} | 🆕 Update available |" >> $GITHUB_STEP_SUMMARY
                DIFF_DETECTED=1
              else
                echo "| $pkg_name | ${old_line#$pkg_name-} | ${line#$pkg_name-} |  Up to date |" >> $GITHUB_STEP_SUMMARY
              fi
            done < current-packages.txt
            
            if [ $DIFF_DETECTED -eq 1 ]; then
              REBUILD=true
              echo "- **Changes detected. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **No changes detected. Skipping build.**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata
        id: meta
        run: |
          {
            echo "# Alfis Versions"
            echo "alfis-${{ steps.get_latest_release.outputs.tag }}"
            echo ""
            echo "# Build Dependencies"
            cat current-packages.txt
          } > meta.txt
          CONTENT=$(cat meta.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

  build:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: alfis
      context: ./alfis
      dockerfile: ./alfis/Dockerfile
      build_args: |
        ALFIS_VERSION=${{ needs.check-versions.outputs.alfis_version }}
      rebuild: ${{ needs.check-versions.outputs.rebuild == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata }}
      extra_platforms: "linux/arm/v7,linux/386"
      push_to_dockerhub: true
    secrets: inherit
