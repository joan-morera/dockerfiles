name: Build and Publish Snowflake Proxy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./snowflake-proxy
    outputs:
      rebuild: ${{ steps.check.outputs.rebuild }}
      version_metadata: ${{ steps.meta.outputs.content }}
      snowflake_sha: ${{ steps.get_snowflake.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get latest Snowflake HEAD commit
        id: get_snowflake
        run: |
          SHA=$(git ls-remote https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/snowflake.git HEAD | awk '{print $1}')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Get Debian package versions
        id: get_pkgs
        run: |
          docker pull debian:trixie-slim
          OUTPUT=$(docker run --rm debian:trixie-slim sh -c "
            apt-get update -qq > /dev/null
            for pkg in tor-geoipdb ca-certificates golang; do
              ver=\$(apt-cache policy \$pkg | grep Candidate | awk '{print \$2}')
              echo \"\${pkg}=\${ver}\"
            done
          ")
          echo "$OUTPUT" > pkgs.txt

      - name: Prepare Metadata and Check for Changes
        id: check
        run: |
          FILE="package-versions.txt"
          REBUILD=false
          SHA="${{ steps.get_snowflake.outputs.sha }}"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD=true
          elif [ ! -f $FILE ] || ! grep -q "$SHA" $FILE; then
            REBUILD=true
          fi
          
          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata
        id: meta
        run: |
          {
            echo "# Snowflake Proxy Versions"
            echo ""
            echo "snowflake-version-${{ steps.get_snowflake.outputs.sha }}"
            echo ""
            echo "# Debian Packages (trixie)"
            cat pkgs.txt
          } > meta.txt
          
          # Convert to single line for output
          CONTENT=$(cat meta.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

  build:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: snowflake-proxy
      context: ./snowflake-proxy
      dockerfile: ./snowflake-proxy/Dockerfile
      build_args: |
        SNOWFLAKE_VERSION=${{ needs.check-versions.outputs.snowflake_sha }}
      rebuild: ${{ needs.check-versions.outputs.rebuild == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata }}
