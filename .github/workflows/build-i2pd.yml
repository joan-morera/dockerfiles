name: Build and Publish I2PD
run-name: Build I2PD

on:
  push:
    paths:
      - 'i2pd/**'
      - '.github/workflows/build-i2pd.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs every day at 0 AM UTC (main)

permissions:
  contents: write
  packages: write

defaults:
  run:
    working-directory: ./i2pd

jobs:
  check-base-packages:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check_changes.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
      - name: Check for package updates
        run: |
          # Define packages to check
          PACKAGES="zlib1g-dev libboost-filesystem1.88-dev libboost-system1.88-dev libboost-program-options1.88-dev libboost-date-time1.88-dev libboost-thread1.88-dev libboost-iostreams1.88-dev libssl-dev libzstd-dev libminiupnpc-dev libstdc++-14-dev"

          # Query repository metadata directly
          docker run --rm debian:trixie-slim sh -c "apt-get update -qq && apt-cache policy $PACKAGES" | \
          awk '/^[^ ]/ {pkg=$1; sub(/:$/,"",pkg)} /Candidate:/ {print pkg "-" $2}' | sort > current-packages.txt
      - name: Compare with stored package list
        id: check_changes
        run: |
          if [ ! -f package-versions.txt ]; then
            echo "package-versions.txt does not exist, treating as changed"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # Filter out i2pd, mimalloc, distroless, and comments from stored list for comparison
            grep -vE "^(i2pd-|mimalloc-|distroless-|#)" package-versions.txt | grep -v "^$" | sort > stored-packages.txt
            if ! cmp -s stored-packages.txt current-packages.txt; then
              echo "Package list has changed."
              echo "Changed packages:"
              diff -u stored-packages.txt current-packages.txt || true
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "Package list has not changed."
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  check-versions:
    runs-on: ubuntu-latest
    outputs:
      new_version_detected: ${{ steps.check.outputs.new_version_detected }}
      latest_tag: ${{ steps.get_latest_release.outputs.tag }}
      latest_mimalloc_tag: ${{ steps.get_latest_mimalloc.outputs.tag }}
      distroless_digest: ${{ steps.get_distroless_digest.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Get latest Distroless digest
        id: get_distroless_digest
        run: |
          # Fetch the latest digest for gcr.io/distroless/cc-debian13
          DIGEST=$(docker manifest inspect gcr.io/distroless/cc-debian13:latest | jq -r '.manifests[0].digest')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
      - name: Get latest i2pd tag
        id: get_latest_release
        run: |
          LATEST_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/PurpleI2P/i2pd.git | grep "refs/tags/2" | grep -v "\^{}" | tail -n1 | sed 's/.*\///')
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
      - name: Get latest mimalloc tag
        id: get_latest_mimalloc
        run: |
          # Fetch tags, filter for v* (release tags), sort by version, and get the latest
          LATEST_TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/microsoft/mimalloc.git | grep "refs/tags/v" | tail -n1 | sed 's/.*\///' | sed 's/\^{}//')
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
      - name: Get current versions from package-versions.txt
        id: get_current_version
        run: |
          echo "version=$(grep "^i2pd-" package-versions.txt | cut -d- -f2)" >> $GITHUB_OUTPUT
          echo "mimalloc_version=$(grep "^mimalloc-" package-versions.txt | cut -d- -f2 || echo "")" >> $GITHUB_OUTPUT
          echo "distroless_digest=$(grep "^distroless-" package-versions.txt | cut -d- -f2 || echo "")" >> $GITHUB_OUTPUT
      - name: Check for new version
        id: check
        run: |
          if [[ "${{ steps.get_latest_release.outputs.tag }}" != "" && "${{ steps.get_latest_release.outputs.tag }}" != "${{ steps.get_current_version.outputs.version }}" ]]; then
            echo "New i2pd commit detected: ${{ steps.get_latest_release.outputs.tag }}"
            echo "new_version_detected=true" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.get_latest_mimalloc.outputs.tag }}" != "" && "${{ steps.get_latest_mimalloc.outputs.tag }}" != "${{ steps.get_current_version.outputs.mimalloc_version }}" ]]; then
            echo "New mimalloc version detected: ${{ steps.get_latest_mimalloc.outputs.tag }}"
            echo "new_version_detected=true" >> $GITHUB_OUTPUT
          elif [[ "${{ steps.get_distroless_digest.outputs.digest }}" != "" && "${{ steps.get_distroless_digest.outputs.digest }}" != "${{ steps.get_current_version.outputs.distroless_digest }}" ]]; then
            echo "New Distroless digest detected: ${{ steps.get_distroless_digest.outputs.digest }}"
            echo "new_version_detected=true" >> $GITHUB_OUTPUT
          else
            echo "No new version detected."
            echo "new_version_detected=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: [check-base-packages, check-versions]
    if: needs.check-base-packages.outputs.changed == 'true' || needs.check-versions.outputs.new_version_detected == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    env:
      IMAGE_NAME: i2pd
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push I2PD image (Multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./i2pd/docker
          file: ./i2pd/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            I2PD_VERSION=${{ needs.check-versions.outputs.latest_tag }}
            MIMALLOC_VERSION=${{ needs.check-versions.outputs.latest_mimalloc_tag }}
            ARM64_VARIANT=generic
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:amd64
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:arm64
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Build and push I2PD image (arm64-rpi4)
        uses: docker/build-push-action@v5
        with:
          context: ./i2pd/docker
          file: ./i2pd/docker/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: |
            I2PD_VERSION=${{ needs.check-versions.outputs.latest_tag }}
            MIMALLOC_VERSION=${{ needs.check-versions.outputs.latest_mimalloc_tag }}
            ARM64_VARIANT=rpi4
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:rpi4
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Update version and package files and commit
        run: |
          # Only update packages-debian.txt if base packages changed
          if [ "${{ needs.check-base-packages.outputs.changed }}" = "true" ]; then
            # Define packages to check
            PACKAGES="zlib1g-dev libboost-filesystem1.88-dev libboost-system1.88-dev libboost-program-options1.88-dev libboost-date-time1.88-dev libboost-thread1.88-dev libboost-iostreams1.88-dev libssl-dev libzstd-dev libminiupnpc-dev libstdc++-14-dev"
            
            # Query repository metadata directly
            docker run --rm debian:trixie-slim sh -c "apt-get update -qq && apt-cache policy $PACKAGES" | \
            awk '/^[^ ]/ {pkg=$1; sub(/:$/,"",pkg)} /Candidate:/ {print pkg "-" $2}' | sort > packages-temp.txt
          fi

          # Update package-versions.txt
          if [ "${{ needs.check-base-packages.outputs.changed }}" = "true" ]; then
             # If base changed, use new package list and append current i2pd version (or new if updated)
             LATEST_I2PD="${{ needs.check-versions.outputs.latest_tag }}"
              MIMALLOC_VER="${{ needs.check-versions.outputs.latest_mimalloc_tag }}"
              DISTROLESS_DIGEST="${{ needs.check-versions.outputs.distroless_digest }}"
              echo "# Main Application Versions" > package-versions.txt
              echo "i2pd-${LATEST_I2PD}" >> package-versions.txt
              echo "mimalloc-${MIMALLOC_VER}" >> package-versions.txt
              echo "" >> package-versions.txt
              echo "# Base Image (Distroless) Digest" >> package-versions.txt
              echo "# This tracks the runtime environment updates" >> package-versions.txt
              echo "distroless-${DISTROLESS_DIGEST}" >> package-versions.txt
              echo "" >> package-versions.txt
              echo "# Build Dependencies (Debian Trixie)" >> package-versions.txt
              echo "# These are used for static linking" >> package-versions.txt
              cat packages-temp.txt >> package-versions.txt
             rm packages-temp.txt
          else
             # If only i2pd changed, update the i2pd line in existing file
             LATEST_I2PD="${{ needs.check-versions.outputs.latest_tag }}"
             MIMALLOC_VER="${{ needs.check-versions.outputs.latest_mimalloc_tag }}"
             sed -i "s/^i2pd-.*/i2pd-${LATEST_I2PD}/" package-versions.txt
             # Update mimalloc version if it exists, or append if missing
             if grep -q "^mimalloc-" package-versions.txt; then
               sed -i "s/^mimalloc-.*/mimalloc-${MIMALLOC_VER}/" package-versions.txt
             else
               echo "mimalloc-${MIMALLOC_VER}" >> package-versions.txt
              fi
              # Update distroless digest
              DISTROLESS_DIGEST="${{ needs.check-versions.outputs.distroless_digest }}"
              if grep -q "^distroless-" package-versions.txt; then
                sed -i "s|^distroless-.*|distroless-${DISTROLESS_DIGEST}|" package-versions.txt
              else
                echo "distroless-${DISTROLESS_DIGEST}" >> package-versions.txt
              fi
          fi
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add package-versions.txt
          if ! git diff --staged --quiet; then
            git commit -m "ci: Update i2pd version and package list"
            git pull --rebase
            git push
          fi
