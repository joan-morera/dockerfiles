name: I2PD | Build and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./i2pd
    outputs:
      rebuild: ${{ steps.check.outputs.rebuild }}
      version_metadata: ${{ steps.meta.outputs.content }}
      i2pd_version: ${{ steps.get_versions.outputs.i2pd }}
      mimalloc_version: ${{ steps.get_versions.outputs.mimalloc }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest tags
        id: get_versions
        run: |
          I2PD=$(git ls-remote --tags --sort='v:refname' https://github.com/PurpleI2P/i2pd.git | grep "refs/tags/2" | grep -v "\^{}" | tail -n1 | sed 's/.*\///')
          MIMALLOC=$(git ls-remote --tags --sort='v:refname' https://github.com/microsoft/mimalloc.git | grep "refs/tags/v" | tail -n1 | sed 's/.*\///' | sed 's/\^{}//')
          echo "i2pd=${I2PD}" >> $GITHUB_OUTPUT
          echo "mimalloc=${MIMALLOC}" >> $GITHUB_OUTPUT

      - name: Check for package updates (Alpine)
        id: get_pkgs
        run: |
          PACKAGES="build-base cmake wget ca-certificates boost-dev boost-static openssl-dev openssl-libs-static zlib-dev zstd-dev zstd-static miniupnpc-dev linux-headers"
          docker run --rm alpine:latest sh -c "apk add --no-cache $PACKAGES > /dev/null 2>&1 && apk info 2>/dev/null" | sort > current-packages.txt

      - name: Check for Changes
        id: check
        run: |
          FILE="package-versions.txt"
          REBUILD=false
          I2PD="${{ steps.get_versions.outputs.i2pd }}"
          MIMALLOC="${{ steps.get_versions.outputs.mimalloc }}"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD=true
          elif [ ! -f $FILE ] || ! grep -q "$I2PD" $FILE || ! grep -q "$MIMALLOC" $FILE; then
            REBUILD=true
          elif ! diff -q current-packages.txt <(grep -vE "^(i2pd-|mimalloc-|#)" $FILE | grep -v "^$" | sort); then
             REBUILD=true
          fi
          
          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata
        id: meta
        run: |
          {
            echo "# I2PD Versions"
            echo "i2pd-${{ steps.get_versions.outputs.i2pd }}"
            echo "mimalloc-${{ steps.get_versions.outputs.mimalloc }}"
            echo ""
            echo "# Alpine Dependencies"
            cat current-packages.txt
          } > meta.txt
          CONTENT=$(cat meta.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

  build:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: i2pd
      context: ./i2pd/docker
      dockerfile: ./i2pd/docker/Dockerfile
      metadata_dir: ./i2pd
      build_args: |
        I2PD_VERSION=${{ needs.check-versions.outputs.i2pd_version }}
        MIMALLOC_VERSION=${{ needs.check-versions.outputs.mimalloc_version }}
      rebuild: ${{ needs.check-versions.outputs.rebuild == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata }}
