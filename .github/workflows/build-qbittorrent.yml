name: qBittorrent | Build and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./qbittorrent
    outputs:
      rebuild_v1: ${{ steps.check.outputs.rebuild_v1 }}
      rebuild_v2: ${{ steps.check.outputs.rebuild_v2 }}
      version_metadata_v1: ${{ steps.meta_v1.outputs.content }}
      version_metadata_v2: ${{ steps.meta_v2.outputs.content }}
      qbt_ver: ${{ steps.get_qbt.outputs.tag }}
      libt_v2_ref: ${{ steps.get_libt_v2.outputs.ref }}
      qt_ver: ${{ steps.get_qt.outputs.tag }}
      boost_v1_ver: ${{ steps.get_boost.outputs.v1 }}
      boost_v2_ver: ${{ steps.get_boost.outputs.v2 }}
      ssl_ver: ${{ steps.get_ssl.outputs.tag }}
      libt_v1_ver: ${{ steps.get_libt_v1.outputs.tag }}
      mimalloc_ver: ${{ steps.get_mimalloc.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Get latest qBittorrent
        id: get_qbt
        run: |
          TAG="release-5.1.4"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Get latest Libtorrent v1
        id: get_libt_v1
        run: |
          TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/arvidn/libtorrent.git \
            | grep "refs/tags/v1.2" | grep -v "RC" | grep -v "\^{}" | tail -n1 | sed 's/.*\///')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Get latest Libtorrent v2
        id: get_libt_v2
        run: |
          REF=$(git ls-remote https://github.com/arvidn/libtorrent.git HEAD | awk '{print $1}')
          echo "ref=${REF}" >> $GITHUB_OUTPUT

      - name: Get latest Qt 6
        id: get_qt
        run: |
           TAG=$(git ls-remote --tags --sort='v:refname' https://code.qt.io/qt/qtbase.git \
             | grep -E "refs/tags/v[0-9]+\." | grep -v "beta\|rc\|alpha" | grep -v "\^{}" | tail -n1 | sed 's/.*\///')
           echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Get Boost Versions
        id: get_boost
        run: |
          V1=$(git ls-remote --tags --sort='v:refname' https://github.com/boostorg/boost.git | grep "refs/tags/boost-1.86" | grep -v "beta\|rc\|alpha" | tail -n1 | sed 's/.*\///')
          V2=$(git ls-remote --tags --sort='v:refname' https://github.com/boostorg/boost.git | grep -E "refs/tags/boost-[0-9]+" | grep -v "beta\|rc\|alpha" | tail -n1 | sed 's/.*\///')
          echo "v1=${V1}" >> $GITHUB_OUTPUT
          echo "v2=${V2}" >> $GITHUB_OUTPUT

      - name: Get latest OpenSSL 3.5 LTS
        id: get_ssl
        run: |
           TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/openssl/openssl.git | grep -E "refs/tags/openssl-3\.5\.[0-9]+$" | tail -n1 | sed 's/.*\///')
           echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Get latest Mimalloc
        id: get_mimalloc
        run: |
           TAG=$(git ls-remote --tags --sort='v:refname' https://github.com/microsoft/mimalloc.git \
             | grep "refs/tags/v" | grep -v "\^{}" | tail -n1 | sed 's/.*\///')
           echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Get Alpine Toolchain & Package Versions
        id: get_alpine
        run: |
          docker run --rm alpine:latest sh -c "apk update >/dev/null && apk list cmake gcc musl-dev" | awk '{print $1}' | sort > current-packages.txt
          echo "Fetched Alpine package versions:"
          cat current-packages.txt

      - name: Compare and Check Versions
        id: check
        run: |
          FILE_V1="package-versions-lt1.txt"
          FILE_V2="package-versions-lt2.txt"
          REBUILD_V1=false
          REBUILD_V2=false
          
          QBT_VER="${{ steps.get_qbt.outputs.tag }}"
          LIBT_V1_VER="${{ steps.get_libt_v1.outputs.tag }}"
          LIBT_V2_REF="${{ steps.get_libt_v2.outputs.ref }}"
          QT_VER="${{ steps.get_qt.outputs.tag }}"
          BOOST_V1_VER="${{ steps.get_boost.outputs.v1 }}"
          BOOST_V2_VER="${{ steps.get_boost.outputs.v2 }}"
          SSL_VER="${{ steps.get_ssl.outputs.tag }}"
          MIMALLOC_VER="${{ steps.get_mimalloc.outputs.tag }}"
          
          echo "### Version Check & Rebuild Report" >> $GITHUB_STEP_SUMMARY
          
          # V1 Check
          echo "#### qBittorrent V1 (Libtorrent v1) Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD_V1=true
            echo "- **Triggered manually via workflow_dispatch. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
          elif [ ! -f "$FILE_V1" ]; then
            REBUILD_V1=true
            echo "- **No existing version metadata found. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
          else
            OLD_QBT=$(grep "^qbittorrent-" "$FILE_V1" | sed 's/qbittorrent-//' || true)
            OLD_LIBT=$(grep "^libtorrent-v1-" "$FILE_V1" | sed 's/libtorrent-v1-//' || true)
            OLD_QT=$(grep "^qt-" "$FILE_V1" | sed 's/qt-//' || true)
            OLD_BOOST=$(grep "^boost-v1-" "$FILE_V1" | sed 's/boost-v1-//' || true)
            OLD_SSL=$(grep "^openssl-" "$FILE_V1" | sed 's/openssl-//' || true)
            OLD_MIMALLOC=$(grep "^mimalloc-" "$FILE_V1" | sed 's/mimalloc-//' || true)
            
            echo "| Component | Cached Version | Upstream/New Version | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            
            check_diff() {
              local name=$1; local old=$2; local new=$3
              if [ "$old" != "$new" ]; then
                echo "| $name | $old | $new | 🆕 Update available |" >> $GITHUB_STEP_SUMMARY
                return 1
              else
                echo "| $name | $old | $new |  Up to date |" >> $GITHUB_STEP_SUMMARY
                return 0
              fi
            }
            
            DIFF_DETECTED=0
            check_diff "qBittorrent" "$OLD_QBT" "$QBT_VER" || DIFF_DETECTED=1
            check_diff "Libtorrent" "$OLD_LIBT" "$LIBT_V1_VER" || DIFF_DETECTED=1
            check_diff "Qt" "$OLD_QT" "$QT_VER" || DIFF_DETECTED=1
            check_diff "Boost" "$OLD_BOOST" "$BOOST_V1_VER" || DIFF_DETECTED=1
            check_diff "OpenSSL" "$OLD_SSL" "$SSL_VER" || DIFF_DETECTED=1
            check_diff "Mimalloc" "$OLD_MIMALLOC" "$MIMALLOC_VER" || DIFF_DETECTED=1
            
            echo "##### Build Toolchain & Alpine Dependencies" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Cached Version | Alpine Repository Version | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            
            while read -r line; do
              pkg_name=$(echo "$line" | cut -d- -f1)
              old_line=$(grep "^${pkg_name}-" "$FILE_V1" || true)
              if [ "$old_line" != "$line" ]; then
                echo "| $pkg_name | ${old_line#$pkg_name-} | ${line#$pkg_name-} | 🆕 Update available |" >> $GITHUB_STEP_SUMMARY
                DIFF_DETECTED=1
              else
                echo "| $pkg_name | ${old_line#$pkg_name-} | ${line#$pkg_name-} |  Up to date |" >> $GITHUB_STEP_SUMMARY
              fi
            done < current-packages.txt
            
            if [ $DIFF_DETECTED -eq 1 ]; then
              REBUILD_V1=true
              echo "- **Changes detected. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **No changes detected. Skipping build.**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # V2 Check
          echo "#### qBittorrent V2 (Libtorrent v2) Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD_V2=true
            echo "- **Triggered manually via workflow_dispatch. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
          elif [ ! -f "$FILE_V2" ]; then
            REBUILD_V2=true
            echo "- **No existing version metadata found. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
          else
            OLD_QBT=$(grep "^qbittorrent-" "$FILE_V2" | sed 's/qbittorrent-//' || true)
            OLD_LIBT=$(grep "^libtorrent-v2-branch-" "$FILE_V2" | sed 's/libtorrent-v2-branch-//' || true)
            OLD_QT=$(grep "^qt-" "$FILE_V2" | sed 's/qt-//' || true)
            OLD_BOOST=$(grep "^boost-v2-" "$FILE_V2" | sed 's/boost-v2-//' || true)
            OLD_SSL=$(grep "^openssl-" "$FILE_V2" | sed 's/openssl-//' || true)
            OLD_MIMALLOC=$(grep "^mimalloc-" "$FILE_V2" | sed 's/mimalloc-//' || true)
            
            echo "| Component | Cached Version | Upstream/New Version | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            
            DIFF_DETECTED=0
            check_diff "qBittorrent" "$OLD_QBT" "$QBT_VER" || DIFF_DETECTED=1
            check_diff "Libtorrent" "$OLD_LIBT" "$LIBT_V2_REF" || DIFF_DETECTED=1
            check_diff "Qt" "$OLD_QT" "$QT_VER" || DIFF_DETECTED=1
            check_diff "Boost" "$OLD_BOOST" "$BOOST_V2_VER" || DIFF_DETECTED=1
            check_diff "OpenSSL" "$OLD_SSL" "$SSL_VER" || DIFF_DETECTED=1
            check_diff "Mimalloc" "$OLD_MIMALLOC" "$MIMALLOC_VER" || DIFF_DETECTED=1
            
            echo "##### Build Toolchain & Alpine Dependencies" >> $GITHUB_STEP_SUMMARY
            echo "| Package | Cached Version | Alpine Repository Version | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            
            while read -r line; do
              pkg_name=$(echo "$line" | cut -d- -f1)
              old_line=$(grep "^${pkg_name}-" "$FILE_V2" || true)
              if [ "$old_line" != "$line" ]; then
                echo "| $pkg_name | ${old_line#$pkg_name-} | ${line#$pkg_name-} | 🆕 Update available |" >> $GITHUB_STEP_SUMMARY
                DIFF_DETECTED=1
              else
                echo "| $pkg_name | ${old_line#$pkg_name-} | ${line#$pkg_name-} |  Up to date |" >> $GITHUB_STEP_SUMMARY
              fi
            done < current-packages.txt
            
            if [ $DIFF_DETECTED -eq 1 ]; then
              REBUILD_V2=true
              echo "- **Changes detected. Rebuilding.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **No changes detected. Skipping build.**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "rebuild_v1=$REBUILD_V1" >> $GITHUB_OUTPUT
          echo "rebuild_v2=$REBUILD_V2" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata V1
        id: meta_v1
        run: |
          {
            echo "# qBittorrent V1 Versions"
            echo "qbittorrent-${{ steps.get_qbt.outputs.tag }}"
            echo "libtorrent-v1-${{ steps.get_libt_v1.outputs.tag }}"
            echo "qt-${{ steps.get_qt.outputs.tag }}"
            echo "boost-v1-${{ steps.get_boost.outputs.v1 }}"
            echo "openssl-${{ steps.get_ssl.outputs.tag }}"
            echo "mimalloc-${{ steps.get_mimalloc.outputs.tag }}"
            echo ""
            echo "# Build Dependencies"
            cat current-packages.txt
          } > meta_v1.txt
          CONTENT=$(cat meta_v1.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata V2
        id: meta_v2
        run: |
          {
            echo "# qBittorrent V2 Versions"
            echo "qbittorrent-${{ steps.get_qbt.outputs.tag }}"
            echo "libtorrent-v2-branch-${{ steps.get_libt_v2.outputs.ref }}"
            echo "qt-${{ steps.get_qt.outputs.tag }}"
            echo "boost-v2-${{ steps.get_boost.outputs.v2 }}"
            echo "openssl-${{ steps.get_ssl.outputs.tag }}"
            echo "mimalloc-${{ steps.get_mimalloc.outputs.tag }}"
            echo ""
            echo "# Build Dependencies"
            cat current-packages.txt
          } > meta_v2.txt
          CONTENT=$(cat meta_v2.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

  build-v1:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: qbittorrent
      context: ./qbittorrent
      dockerfile: ./qbittorrent/Dockerfile
      build_args: |
        QBITTORRENT_VERSION=${{ needs.check-versions.outputs.qbt_ver }}
        LIBTORRENT_VERSION=${{ needs.check-versions.outputs.libt_v1_ver }}
        QT_VERSION=${{ needs.check-versions.outputs.qt_ver }}
        BOOST_VERSION=${{ needs.check-versions.outputs.boost_v1_ver }}
        OPENSSL_VERSION=${{ needs.check-versions.outputs.ssl_ver }}
        MIMALLOC_VERSION=${{ needs.check-versions.outputs.mimalloc_ver }}
      rebuild: ${{ needs.check-versions.outputs.rebuild_v1 == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata_v1 }}
      metadata_file: package-versions-lt1.txt
      extra_variants: |
        [
          {
            "platform": "linux/arm64",
            "runner": "ubuntu-24.04-arm",
            "suffix": "rpi4",
            "build_args": "CFLAGS=-Os -mcpu=cortex-a72 -fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wformat -Werror=format-security -ffunction-sections -fdata-sections\nCXXFLAGS=-Os -mcpu=cortex-a72 -fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wformat -Werror=format-security -flto -fvisibility=hidden -ffunction-sections -fdata-sections"
          }
        ]

  build-v2:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: qbittorrent-lt2
      context: ./qbittorrent
      dockerfile: ./qbittorrent/Dockerfile
      build_args: |
        QBITTORRENT_VERSION=${{ needs.check-versions.outputs.qbt_ver }}
        LIBTORRENT_VERSION=${{ needs.check-versions.outputs.libt_v2_ref }}
        QT_VERSION=${{ needs.check-versions.outputs.qt_ver }}
        BOOST_VERSION=${{ needs.check-versions.outputs.boost_v2_ver }}
        OPENSSL_VERSION=${{ needs.check-versions.outputs.ssl_ver }}
        MIMALLOC_VERSION=${{ needs.check-versions.outputs.mimalloc_ver }}
      rebuild: ${{ needs.check-versions.outputs.rebuild_v2 == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata_v2 }}
      metadata_file: package-versions-lt2.txt
      extra_variants: |
        [
          {
            "platform": "linux/arm64",
            "runner": "ubuntu-24.04-arm",
            "suffix": "rpi4",
            "build_args": "CFLAGS=-Os -mcpu=cortex-a72 -fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wformat -Werror=format-security -ffunction-sections -fdata-sections\nCXXFLAGS=-Os -mcpu=cortex-a72 -fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wformat -Werror=format-security -flto -fvisibility=hidden -ffunction-sections -fdata-sections"
          }
        ]
