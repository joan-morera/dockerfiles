name: Navidrome | Build and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 0'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./navidrome
    outputs:
      rebuild: ${{ steps.check.outputs.rebuild }}
      version_metadata: ${{ steps.meta.outputs.content }}
      navidrome_ver: ${{ steps.get_navidrome.outputs.sha }}
      ffmpeg_ver: ${{ steps.get_ffmpeg.outputs.sha }}
      opus_ver: ${{ steps.get_opus.outputs.sha }}
      lame_ver: ${{ steps.get_lame.outputs.sha }}
      taglib_ver: ${{ steps.get_taglib.outputs.sha }}
      zlib_ver: ${{ steps.get_zlib.outputs.ver }}
    steps:
      - uses: actions/checkout@v6

      - name: Get latest Navidrome (Release)
        id: get_navidrome
        run: echo "sha=$(curl -s https://api.github.com/repos/navidrome/navidrome/releases/latest | jq -r .tag_name | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Get latest FFmpeg (Release)
        id: get_ffmpeg
        run: echo "sha=$(curl -s https://api.github.com/repos/FFmpeg/FFmpeg/tags | jq -r '.[].name' | grep '^n[0-9]' | grep -v '\-dev' | head -n 1 | sed 's/^n//')" >> $GITHUB_OUTPUT

      - name: Get latest Opus (Release)
        id: get_opus
        run: echo "sha=$(curl -s https://api.github.com/repos/xiph/opus/releases/latest | jq -r .tag_name | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Get latest Lame (Release)
        id: get_lame
        run: echo "sha=$(curl -s "https://salsa.debian.org/api/v4/projects/8041/repository/tags?per_page=100" | jq -r '.[].name' | grep '^debian/' | grep -v 'svn' | sort -V | tail -n 1 | sed 's/^debian\///')" >> $GITHUB_OUTPUT

      - name: Get latest TagLib (Release)
        id: get_taglib
        run: echo "sha=$(curl -s https://api.github.com/repos/taglib/taglib/releases/latest | jq -r .tag_name | sed 's/^v//')" >> $GITHUB_OUTPUT

      - name: Get latest Zlib (Release)
        id: get_zlib
        run: |
          VER=$(curl -s https://api.github.com/repos/madler/zlib/releases/latest | jq -r .tag_name | sed 's/^v//')
          if [ "$VER" == "null" ] || [ -z "$VER" ]; then
            VER=$(curl -s https://zlib.net/ | grep -oE 'zlib-[0-9.]+\.tar\.gz' | head -n 1 | sed 's/zlib-//;s/\.tar\.gz//')
          fi
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - name: Check for Changes
        id: check
        run: |
          FILE="package-versions.txt"
          REBUILD=false
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD=true
          elif [ ! -f $FILE ] || ! grep -q "${{ steps.get_navidrome.outputs.sha }}" $FILE; then
            REBUILD=true
          fi
          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata
        id: meta
        run: |
          {
            echo "# Navidrome Build Versions"
            echo "navidrome-${{ steps.get_navidrome.outputs.sha }}"
            echo "ffmpeg-${{ steps.get_ffmpeg.outputs.sha }}"
            echo "opus-${{ steps.get_opus.outputs.sha }}"
            echo "mp3lame-${{ steps.get_lame.outputs.sha }}"
            echo "taglib-${{ steps.get_taglib.outputs.sha }}"
            echo "zlib-${{ steps.get_zlib.outputs.ver }}"
          } > meta.txt
          CONTENT=$(cat meta.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

  build:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: navidrome
      context: ./navidrome
      dockerfile: ./navidrome/Dockerfile
      build_args: |
        NAVIDROME_VERSION=${{ needs.check-versions.outputs.navidrome_ver }}
        FFMPEG_VERSION=${{ needs.check-versions.outputs.ffmpeg_ver }}
        OPUS_VERSION=${{ needs.check-versions.outputs.opus_ver }}
        MP3LAME_VERSION=${{ needs.check-versions.outputs.lame_ver }}
        TAGLIB_VERSION=${{ needs.check-versions.outputs.taglib_ver }}
        ZLIB_VERSION=${{ needs.check-versions.outputs.zlib_ver }}
        CFLAGS=-O3 -fstack-protector-strong -D_FORTIFY_SOURCE=2
        CXXFLAGS=-O3 -fstack-protector-strong -D_FORTIFY_SOURCE=2
      rebuild: ${{ needs.check-versions.outputs.rebuild == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata }}
      extra_variants: |
        [
          {
            "platform": "linux/arm64",
            "runner": "ubuntu-24.04-arm",
            "suffix": "rpi4",
            "build_args": "CFLAGS=-O3 -mcpu=cortex-a72 -fstack-protector-strong -D_FORTIFY_SOURCE=2\nCXXFLAGS=-O3 -mcpu=cortex-a72 -fstack-protector-strong -D_FORTIFY_SOURCE=2"
          },
          {
            "platform": "linux/amd64",
            "runner": "ubuntu-latest",
            "suffix": "amd64-v3",
            "build_args": "CFLAGS=-O3 -march=x86-64-v3 -fstack-protector-strong -D_FORTIFY_SOURCE=2\nCXXFLAGS=-O3 -march=x86-64-v3 -fstack-protector-strong -D_FORTIFY_SOURCE=2"
          }
        ]
