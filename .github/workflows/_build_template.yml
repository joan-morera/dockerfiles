name: Template | Container Build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      build_args:
        required: false
        type: string
      platforms:
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      rebuild:
        required: true
        type: boolean
      version_metadata:
        required: true
        type: string
        description: "Content to write to package-versions.txt"
      metadata_dir:
        required: false
        type: string
        description: "Directory to write the metadata file (defaults to context)"
        default: ""
      metadata_file:
        required: false
        type: string
        description: "Name of the metadata file to write"
        default: "package-versions.txt"
      extra_platforms:
        required: false
        type: string
        description: "Additional platforms (e.g. linux/arm/v7,linux/386). Comma separated."
        default: ""
      push_to_dockerhub:
        required: false
        type: boolean
        description: "Whether to push the image to Docker Hub"
        default: false
      dockerhub_repo:
        required: false
        type: string
        description: "Optional Docker Hub repository name (defaults to image_name)"
        default: ""

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      suffixes: ${{ steps.set-matrix.outputs.suffixes }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          PLATFORMS="${{ inputs.platforms }}${{ inputs.extra_platforms != '' && ',' || '' }}${{ inputs.extra_platforms }}"
          IFS=',' read -ra ADDR <<< "$PLATFORMS"
          MATRIX_JSON='{"include":['
          SUFFIXES=""
          FIRST=true
          for i in "${ADDR[@]}"; do
            P=$(echo "$i" | xargs)
            [ -z "$P" ] && continue

            if [ "$FIRST" = true ]; then FIRST=false; else MATRIX_JSON+=','; fi
            
            case "$P" in
              "linux/amd64") SUFFIX="amd64"; RUNNER="ubuntu-latest" ;;
              "linux/arm64") SUFFIX="arm64"; RUNNER="ubuntu-24.04-arm" ;;
              "linux/arm/v7") SUFFIX="armv7"; RUNNER="ubuntu-latest" ;;
              "linux/386") SUFFIX="386"; RUNNER="ubuntu-latest" ;;
              *) SUFFIX=$(echo "$P" | sed 's/\//-/g'); RUNNER="ubuntu-latest" ;;
            esac
            
            MATRIX_JSON+="{\"platform\":\"$P\",\"runner\":\"$RUNNER\",\"suffix\":\"$SUFFIX\"}"
            SUFFIXES+="$SUFFIX "
          done
          MATRIX_JSON+=']}'
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "suffixes=$(echo $SUFFIXES | xargs)" >> $GITHUB_OUTPUT

  build:
    needs: setup-matrix
    if: inputs.rebuild || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: inputs.push_to_dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push (${{ matrix.suffix }})
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: ${{ inputs.build_args }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ matrix.suffix }}
            ${{ inputs.push_to_dockerhub && format('{0}/{1}:{2}', secrets.DOCKERHUB_USERNAME, (inputs.dockerhub_repo != '' && inputs.dockerhub_repo || inputs.image_name), matrix.suffix) || '' }}
          cache-from: type=gha,scope=build-${{ inputs.image_name }}-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=build-${{ inputs.image_name }}-${{ matrix.suffix }}

  merge-tags:
    needs: [setup-matrix, build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: inputs.push_to_dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          PLATFORMS="${{ needs.setup-matrix.outputs.suffixes }}"
          
          # GHCR Manifest
          IMAGE_GHCR="ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}"
          TAGS_GHCR=""
          for p in $PLATFORMS; do TAGS_GHCR="$TAGS_GHCR $IMAGE_GHCR:$p"; done
          docker buildx imagetools create -t $IMAGE_GHCR:latest $TAGS_GHCR
          
          # Docker Hub Manifest
          if [ "${{ inputs.push_to_dockerhub }}" = "true" ]; then
            IMAGE_DH="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.dockerhub_repo != '' && inputs.dockerhub_repo || inputs.image_name }}"
            TAGS_DH=""
            for p in $PLATFORMS; do TAGS_DH="$TAGS_DH $IMAGE_DH:$p"; done
            docker buildx imagetools create -t $IMAGE_DH:latest $TAGS_DH
          fi

  update-repo:
    needs: merge-tags
    if: inputs.rebuild || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: repo-update-${{ inputs.context }}-${{ inputs.metadata_file }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package-versions.txt
        shell: bash
        run: |
          TARGET_DIR="${{ inputs.metadata_dir }}"
          if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR="${{ inputs.context }}"
          fi
          cd "$TARGET_DIR"
          echo "${{ inputs.version_metadata }}" | base64 -d > "${{ inputs.metadata_file }}"
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add "${{ inputs.metadata_file }}"
          if ! git diff --staged --quiet; then
            git commit -m "ci: Update ${{ inputs.image_name }} metadata"
            git pull --rebase
            git push
          fi

  prune-packages:
    needs: update-repo
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Prune untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ inputs.image_name }}
          package-type: 'container'
          min-versions-to-keep: 0
          delete-only-untagged-versions: 'true'
