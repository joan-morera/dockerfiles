name: Tor Bridge | Build and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  packages: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tor-bridge
    outputs:
      rebuild: ${{ steps.check.outputs.rebuild }}
      version_metadata: ${{ steps.meta.outputs.content }}
      lyrebird_sha: ${{ steps.get_lyrebird.outputs.sha }}
      tor_sha: ${{ steps.get_tor.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get latest Lyrebird HEAD commit
        id: get_lyrebird
        run: echo "sha=$(git ls-remote https://gitlab.torproject.org/tpo/anti-censorship/pluggable-transports/lyrebird.git HEAD | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Get latest Tor HEAD commit
        id: get_tor
        run: echo "sha=$(git ls-remote https://gitlab.torproject.org/tpo/core/tor.git HEAD | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Check for Alpine build dependency versions
        id: get_pkgs
        run: |
          LIBS="libevent-dev openssl-dev zlib-dev zstd-dev xz-dev lz4-dev libseccomp-dev libcap-dev"
          docker run --rm alpine:latest sh -c "apk update -q 2>/dev/null; for pkg in $LIBS; do apk search -x \$pkg 2>/dev/null | head -1; done" | grep -v '^$' | sort > current-packages.txt

      - name: Check for Changes
        id: check
        run: |
          FILE="package-versions.txt"
          REBUILD=false
          L_SHA="${{ steps.get_lyrebird.outputs.sha }}"
          T_SHA="${{ steps.get_tor.outputs.sha }}"
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            REBUILD=true
          elif [ ! -f $FILE ] || ! grep -q "$L_SHA" $FILE || ! grep -q "$T_SHA" $FILE; then
            REBUILD=true
          elif ! diff -q current-packages.txt <(grep -vE "^(lyrebird-|tor-|#)" $FILE | grep -v "^$" | sort); then
             REBUILD=true
          fi
          
          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT

      - name: Generate Version Metadata
        id: meta
        run: |
          {
            echo "# Tor Bridge Versions"
            echo "lyrebird-${{ steps.get_lyrebird.outputs.sha }}"
            echo "tor-${{ steps.get_tor.outputs.sha }}"
            echo ""
            echo "# Build Dependencies (Alpine)"
            cat current-packages.txt
          } > meta.txt
          CONTENT=$(cat meta.txt | base64 -w 0)
          echo "content=$CONTENT" >> $GITHUB_OUTPUT

  build:
    needs: check-versions
    uses: ./.github/workflows/_build_template.yml
    with:
      image_name: tor-bridge
      context: ./tor-bridge
      dockerfile: ./tor-bridge/Dockerfile
      build_args: |
        LYREBIRD_VERSION=${{ needs.check-versions.outputs.lyrebird_sha }}
        TOR_VERSION=${{ needs.check-versions.outputs.tor_sha }}
      rebuild: ${{ needs.check-versions.outputs.rebuild == 'true' }}
      version_metadata: ${{ needs.check-versions.outputs.version_metadata }}
